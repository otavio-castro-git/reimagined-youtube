<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="style.css">

        <!--vou usar o mesmo que usei no codigo anterior, para por os simbolos-->
       
        <link href="https://fonts.googleapis.com/icon?family=material+icons" rel="stylesheet">
         <title>BeatTube</title>
    </head>
    <!--vou dividir em 3 partes, a sequencia sera cabecalho, que sera header, sidebar e o central-->
    <body>
       <!--cabecalho/header-->
        <header>
            
            <!--tirei print do logo na imagem de exemplo que o otavio passou no grupo, no lado esquerdo-->
            <div class="header-content">
            <div class="logo">
                <img src="beattube.png" alt="beattube.logo">
            </div>

            <!--pesquisar, no meio-->
            <div class="pesquisar">
                <input type="text" placeholder="clique para pesquisar">
            <span class="material-icons" aria-label="pesquisar">search</span>
            </div>

            <!--aquele login lá do lado direito, usei um printda tela-->

            <div class="login">
            <img src="login.png" alt="login">
            </div>
            </div>
       </header>

       
       <!--vou fazer agora o sidebar, aquela barra lateral-->

       <nav class="sidebar">
        <div class="lateral">
        <p class="label">paginas</p>
            <a href="#"><span class="material-icons" aria-label="principal">home</span></a>
            <a href="#"><span class="material-icons" aria-label="tendencias">trending_up</span></a>
           </div>

            <div class="lateral">
                <p class="label">biblioteca</p>
                <a href="#"><span class="material-icons" aria-label="historico">history</span></a>
                <a href="#"><span class="material-icons" aria-label="playlist">playlist_play</span></a>
                <a href="#"><span class="material-icons" aria-label="seguindo">group</span></a>
            </div>

                <div class="lateral">
                    <p class="label">usuario</p>
                   <a href="#"><span class="material-icons" aria-label="configurações">settings</span></a>
                   <a href="#"><span class="material-icons" aria-label="seus planos">monetization_on</span></a>
                    <a href="#"><span class="material-icons" aria-label="torne-se um criador">star</span></a>
                    <a href="#"><span class="material-icons" aria-label="sair">logout</span></a>
                </div>
                </nav>

                <!--só coloquei # no lugar pq ainda nao sei as outras telas que cada botao vai enviar-->

                <main>
       <!--vou criar um aqui so pro banner em cima-->
       <div class="banner">
        <div class="overlay">
            <span class="tag">#1 mais ouvida</span>

            <h3>nome da musica</h3>
            <p>nome da banda</p>
        </div>
        </div>
        <!--esse daqui pro "ouvir novamente"-->
       
        <div class="ouvir">
        <span class="index">01</span>
        <img class="cover" src="capa.jpeg" alt="capa">
        <div class="info">
            <h3>Nome da musica</h3>
            <p>Artista</p>
        </div>
        </div>

            <!--agora vou fazer do recomendacoes-->

        <div class="recomendacoes">
            <span class="index">01</span>
            <img class="cover" src="capa.jpeg" alt="capa">
            <div class="info-musica">
                <h3>nome do artista</h3>
                <p>nome do artista</p>
            </div>
        </div>
        </main>
      </body>
</html>
